name: daily-scan

# 每個工作日（台北）收盤後自動執行；也可在 Actions 頁面手動觸發。
on:
  schedule:
    # cron 使用 UTC。07:30 UTC = 台北 15:30（三大法人約 14:00 公布，留緩衝）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:   # 允許手動按鈕執行

# 讓 workflow 有權限把更新後的檔案 commit 回 repo
permissions:
  contents: write

# 避免兩次執行同時推送互相打架
concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行建檔
        run: python scan.py

      - name: Commit 更新後的資料
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json data/history
          if git diff --cached --quiet; then
            echo "沒有變更，略過 commit"
          else
            git commit -m "資料更新 $(date -u +%Y-%m-%d)"
            git push
          fi
